    // 1. Prevent double-tap zoom (iOS Safari hack)
    document.addEventListener(
      "touchstart",
      function (event) {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      },
      { passive: false },
    );

    // 2. Prevent pinch-to-zoom (iOS Safari hack)
    document.addEventListener(

    document.addEventListener(

      function (event) {
        const now = new Date().getTime();

          event.preventDefault();
        }
        lastTouchEnd = now;
      },
      false,
    );
